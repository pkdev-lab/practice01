---
- name: Deploy Website
  hosts: web
  become: true

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install pip
      apt:
        name: python3-pip
        state: present

    - name: Install Docker SDK
      apt:
        name: python3-docker
        state: present